<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Groups</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: #f5f7fa;
    font-family: 'Poppins', sans-serif;
}

.group-card {
    background: white;
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    margin-bottom: 22px;
}

.group-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.actions {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}
</style>
</head>

<body>
<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Your Groups</h3>
        <a href="/groups/create" class="btn btn-success">
            <i class="fas fa-plus"></i> Create Group
        </a>
    </div>

    {% if groups %}
        {% for g in groups %}
        <div class="group-card">

            <!-- Group Header -->
            <div class="group-header">
                <h5 class="mb-0">{{ g.name }}</h5>
                <span class="badge 
                    {% if g.role == 'admin' %}bg-info{% else %}bg-secondary{% endif %}">
                    {{ g.role }}
                </span>
            </div>

            <!-- Actions -->
            <div class="actions">

                <a href="/groups/{{ g.id }}" class="btn btn-outline-primary btn-sm">
                    <i class="fas fa-eye"></i> View
                </a>

                <a href="/groups/{{ g.id }}/add-expense" class="btn btn-outline-success btn-sm">
                    <i class="fas fa-plus-circle"></i> Add Expense
                </a>

                {% if g.role == "admin" %}
                <a href="/groups/{{ g.id }}/invite" class="btn btn-outline-warning btn-sm">
                    <i class="fas fa-user-plus"></i> Invite
                </a>

                <!-- DELETE GROUP -->
                <form method="POST"
                      action="/groups/{{ g.id }}/delete"
                      onsubmit="return confirm('Delete this group permanently?');"
                      style="display:inline;">
                    <button class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </form>
                {% endif %}

            </div>

        </div>
        {% endfor %}
    {% else %}
        <div class="alert alert-warning">
            You are not part of any group yet.
        </div>
    {% endif %}

    <a href="/" class="btn btn-secondary mt-4">
        ← Back to Dashboard
    </a>

</div>
</body>
</html>
