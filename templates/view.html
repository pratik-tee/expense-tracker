<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Expenses</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #e8f6f5, #eef8f3);
    padding: 40px 0;
}

.page-card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 25px 45px rgba(0,0,0,0.15);
    padding: 30px;
    animation: fadeIn 0.6s ease;
}

.card-header-custom {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    padding: 18px;
    border-radius: 14px;
    text-align: center;
    font-size: 1.25rem;
    margin-bottom: 25px;
}

.form-control, .form-select {
    border-radius: 10px;
}

.table th {
    background: #2c5364;
    color: white;
}

.action-btn {
    border-radius: 10px;
    transition: all 0.25s ease;
}

.action-btn:hover {
    transform: translateY(-2px);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
<div class="page-card">

    <div class="card-header-custom">
        <i class="fas fa-list me-2"></i> All Expenses
    </div>

    <!-- Filter -->
    <form method="GET" class="row g-3 mb-4">
        <div class="col-md-3">
            <label class="form-label">Start Date</label>
            <input type="date" name="start" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">End Date</label>
            <input type="date" name="end" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label">Category</label>
            <select name="category" class="form-select">
                <option value="">All</option>
                <option>Food</option>
                <option>Transport</option>
                <option>Utilities</option>
                <option>Shopping</option>
                <option>Rent</option>
                <option>Health</option>
                <option>Entertainment</option>
                <option>Other</option>
            </select>
        </div>
        <div class="col-md-3 d-grid align-items-end">
            <button class="btn btn-primary action-btn">
                <i class="fas fa-filter me-1"></i> Apply
            </button>
        </div>
    </form>

    <!-- Total -->
    <div class="mb-3 fw-semibold">
        Total Expense: <span class="text-success">₹{{ total }}</span>
    </div>

    <!-- Table -->
    {% if expenses %}
    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead>
                <tr class="text-center">
                    <th>Date</th>
                    <th>Title</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody>
                {% for e in expenses %}
                <tr>
                    <td>{{ e[4] }}</td>
                    <td>{{ e[1] }}</td>
                    <td>₹{{ e[2] }}</td>
                    <td>{{ e[3] }}</td>
                    <td class="text-center">
                        <form method="POST" action="/delete/{{ e[0] }}" onsubmit="return confirm('Delete this expense?')">
                            <button class="btn btn-sm btn-danger action-btn">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
        <div class="alert alert-warning text-center">No expenses found.</div>
    {% endif %}

    <!-- Footer buttons -->
    <div class="d-flex justify-content-between mt-4">
        <a href="/" class="btn btn-secondary action-btn">
            <i class="fas fa-arrow-left me-1"></i> Back
        </a>
        <div>
            <a href="/export" class="btn btn-success action-btn me-2">
                <i class="fas fa-file-csv me-1"></i> Export CSV
            </a>
            <a href="/pie" class="btn btn-info text-white action-btn">
                <i class="fas fa-chart-pie me-1"></i> Pie Chart
            </a>
        </div>
    </div>

</div>
</div>

</body>
</html>
