<!DOCTYPE html>
<html>
<head>
    <title>Add Group Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h4 class="mb-3">Add Expense</h4>

        <form method="post">
            <input type="text" name="title" class="form-control mb-3"
                   placeholder="Expense title" required>

            <input type="number" step="0.01" name="amount"
                   class="form-control mb-3" placeholder="Amount" required>

            <input type="text" name="category"
                   class="form-control mb-3" placeholder="Category">

            <input type="date" name="date"
                   class="form-control mb-3" required>

            <button class="btn btn-primary">Add Expense</button>
            <a href="/groups/{{ group_id }}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
