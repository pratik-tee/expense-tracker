<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add New Expense</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #e8f6f5, #eef8f3);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.expense-card {
    width: 100%;
    max-width: 520px;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 25px 45px rgba(0,0,0,0.15);
    overflow: hidden;
    animation: fadeIn 0.7s ease;
}

/* Header */
.card-header {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    padding: 22px;
    text-align: center;
    font-size: 1.25rem;
    font-weight: 500;
}

/* Body */
.card-body {
    padding: 28px;
}

.form-label {
    font-weight: 500;
    margin-bottom: 6px;
}

.form-control,
.form-select {
    border-radius: 10px;
    padding: 11px 14px;
    transition: all 0.3s ease;
}

.form-control:focus,
.form-select:focus {
    border-color: #2c5364;
    box-shadow: 0 0 0 0.15rem rgba(44,83,100,0.25);
    transform: scale(1.01);
}

/* Buttons */
.btn-cancel {
    background: #6c757d;
    color: #fff;
    border-radius: 10px;
    padding: 10px;
    transition: all 0.3s ease;
}

.btn-cancel:hover {
    background: #5a6268;
    transform: translateY(-1px);
}

.btn-add {
    background: #198754;
    color: #fff;
    border-radius: 10px;
    padding: 10px;
    transition: all 0.3s ease;
}

.btn-add:hover {
    background: #157347;
    transform: translateY(-1px);
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="expense-card">
    
    <!-- Header -->
    <div class="card-header">
        <i class="fas fa-wallet me-2"></i> Add New Expense
    </div>

    <!-- Body -->
    <div class="card-body">
        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Item Name</label>
                <input type="text" name="title" class="form-control" placeholder="e.g., Groceries" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Price (₹)</label>
                <input type="number" step="0.01" name="amount" class="form-control" placeholder="e.g., 250.00" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" rows="3" class="form-control" placeholder="Optional notes"></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label">Category</label>
                <select name="category" class="form-select" required>
                    <option disabled selected>Select a category</option>
                    <option>Food</option>
                    <option>Transport</option>
                    <option>Utilities</option>
                    <option>Shopping</option>
                    <option>Rent</option>
                    <option>Health</option>
                    <option>Entertainment</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="row g-3">
                <div class="col-6 d-grid">
                    <a href="/" class="btn btn-cancel">
                        <i class="fas fa-arrow-left me-1"></i> Cancel
                    </a>
                </div>
                <div class="col-6 d-grid">
                    <button type="submit" class="btn btn-add">
                        <i class="fas fa-plus me-1"></i> Add
                    </button>
                </div>
            </div>

        </form>
    </div>
</div>

</body>
</html>
